<!-- Authenticated Layout -->
<div *ngIf="isAuthenticated$ | async; else loginLayout">
  <!-- Top Navbar -->
  <app-navbar (sidebarToggle)="onSidebarToggle()"></app-navbar>

  <!-- Main Layout Container -->
  <div class="main-layout">
    <mat-sidenav-container class="sidenav-container">
      <!-- Sidebar Navigation -->
      <mat-sidenav
        #drawer
        class="sidenav"
        [style.width]="(isHandset$ | async) ? '280px' : sidebarWidth"
        [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
        [mode]="(isHandset$ | async) ? 'over' : 'side'"
        [opened]="(isHandset$ | async) === false"
        [disableClose]="(isHandset$ | async) === false">
        <app-sidebar
          [isCollapsed]="(isHandset$ | async) ? false : isSidebarCollapsed"
          [isHandset]="(isHandset$ | async) || false"
          (navigationOccurred)="onNavigationCollapse()">
        </app-sidebar>
      </mat-sidenav>

      <!-- Main Content Area -->
      <mat-sidenav-content
        class="main-content-container"
        [class.sidebar-collapsed]="isSidebarCollapsed && !(isHandset$ | async)">
        <main class="main-content">
          <router-outlet></router-outlet>
        </main>
      </mat-sidenav-content>
    </mat-sidenav-container>
  </div>
</div>

<!-- Login Layout -->
<ng-template #loginLayout>
  <div class="login-layout">
    <!-- Debug: In login layout template -->
    <router-outlet></router-outlet>
  </div>
</ng-template>
