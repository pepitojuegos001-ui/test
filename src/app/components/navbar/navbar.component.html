<mat-toolbar color="primary" class="navbar">
  <!-- Left side: Menu toggle and title -->
  <div class="navbar-left">
    <button 
      mat-icon-button 
      class="sidebar-toggle"
      (click)="onSidebarToggle()"
      aria-label="Toggle sidebar">
      <mat-icon>menu</mat-icon>
    </button>
    <span class="navbar-title">{{ 'NAVBAR.TITLE' | translate }}</span>
  </div>

  <!-- Spacer to push right content to the end -->
  <span class="navbar-spacer"></span>

  <!-- Right side: Notifications, Chat, Username, Avatar -->
  <div class="navbar-right">
    <!-- Notifications -->
    <button 
      mat-icon-button 
      class="navbar-icon-btn"
      (click)="onNotifications()"
      [matTooltip]="'Notifications'"
      matTooltipPosition="below">
      <mat-icon [matBadge]="notifications" [matBadgeHidden]="notifications === 0" matBadgeColor="warn">
        notifications
      </mat-icon>
    </button>

    <!-- Chat/Feedback -->
    <button 
      mat-icon-button 
      class="navbar-icon-btn"
      (click)="onChat()"
      [matTooltip]="'Chat & Feedback'"
      matTooltipPosition="below">
      <mat-icon>chat</mat-icon>
    </button>

    <!-- Username and Avatar with dropdown -->
    <div class="user-section">
      <span class="username">{{ username }}</span>
      <div class="user-menu-container">
        <button 
          mat-icon-button 
          class="user-avatar"
          (click)="toggleUserMenu()"
          [attr.aria-expanded]="isUserMenuOpen"
          aria-label="User menu">
          <mat-icon class="avatar-icon">account_circle</mat-icon>
        </button>
        
        <!-- User dropdown menu -->
        <div class="user-dropdown" [class.show]="isUserMenuOpen">
          <div class="dropdown-content">
            <button 
              mat-menu-item 
              class="dropdown-item"
              (click)="onConfiguration()">
              <mat-icon>settings</mat-icon>
              <span>Configuration</span>
            </button>
            <mat-divider></mat-divider>
            <button 
              mat-menu-item 
              class="dropdown-item logout"
              (click)="onLogout()">
              <mat-icon>logout</mat-icon>
              <span>Logout</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</mat-toolbar>

<!-- Overlay to close dropdown when clicking outside -->
<div 
  class="dropdown-overlay" 
  [class.show]="isUserMenuOpen"
  (click)="isUserMenuOpen = false">
</div>
