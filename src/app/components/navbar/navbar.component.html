<mat-toolbar color="primary" class="navbar">
  <!-- Left side: Menu toggle and title -->
  <div class="navbar-left">
    <button
      mat-icon-button
      class="sidebar-toggle"
      (click)="onSidebarToggle()"
      aria-label="Toggle sidebar"
    >
      <mat-icon>menu</mat-icon>
    </button>
    <span class="navbar-title">{{ "NAVBAR.TITLE" | translate }}</span>
  </div>

  <!-- Spacer to push right content to the end -->
  <span class="navbar-spacer"></span>

  <!-- Right side: Notifications, Chat, Username, Avatar -->
  <div class="navbar-right">
    <!-- Theme Toggle -->
    <button
      mat-icon-button
      class="navbar-icon-btn theme-toggle-btn"
      (click)="toggleTheme()"
      [matTooltip]="getThemeTooltip()"
      matTooltipPosition="below"
      [attr.aria-label]="getThemeTooltip()"
    >
      <mat-icon [class.theme-transition]="true">
        {{ getCurrentThemeIcon() }}
      </mat-icon>
    </button>

    <!-- Notifications -->
    <button
      mat-icon-button
      class="navbar-icon-btn notification-btn"
      (click)="onNotifications()"
      [matTooltip]="'NAVBAR.NOTIFICATIONS' | translate"
      matTooltipPosition="below"
    >
      <mat-icon>notifications</mat-icon>
      <span class="notification-badge">{{ notifications }}</span>
    </button>

    <!-- Chat/Feedback -->
    <button
      mat-icon-button
      class="navbar-icon-btn"
      (click)="onChat()"
      [matTooltip]="'NAVBAR.CHAT_FEEDBACK' | translate"
      matTooltipPosition="below"
    >
      <mat-icon>chat</mat-icon>
    </button>

    <!-- Language Switcher -->
    <div class="language-switcher">
      <button
        mat-icon-button
        class="navbar-icon-btn language-btn"
        (click)="toggleLanguageMenu()"
        [matTooltip]="'NAVBAR.LANGUAGE' | translate"
        matTooltipPosition="below"
        [attr.aria-expanded]="isLanguageMenuOpen"
      >
        <img
          class="language-flag"
          [src]="getCurrentLanguageFlag()"
          alt="flag"
          width="24"
          height="16"
        />
      </button>

      <!-- Language dropdown menu -->
      <div class="language-dropdown" [class.show]="isLanguageMenuOpen">
        <div class="dropdown-content">
          <button
            *ngFor="let language of availableLanguages"
            mat-menu-item
            class="dropdown-item language-item"
            [class.active]="language.code === currentLanguage"
            (click)="onLanguageChange(language.code)"
          >
            <img
              class="language-flag"
              [src]="language.flag"
              alt="{{ language.code }} flag"
              width="24"
              height="16"
            />
            <span class="language-name">{{ language.name }}</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Username and Avatar with dropdown -->
    <div class="user-section">
      <span class="username">{{ username }}</span>
      <div class="user-menu-container">
        <button
          mat-icon-button
          class="user-avatar"
          (click)="toggleUserMenu()"
          [attr.aria-expanded]="isUserMenuOpen"
          aria-label="User menu"
        >
          <mat-icon class="avatar-icon">account_circle</mat-icon>
        </button>

        <!-- User dropdown menu -->
        <div class="user-dropdown" [class.show]="isUserMenuOpen">
          <div class="dropdown-content">
            <button
              mat-menu-item
              class="dropdown-item"
              (click)="onConfiguration()"
            >
              <mat-icon>settings</mat-icon>
              <span>{{ "NAVBAR.CONFIGURATION" | translate }}</span>
            </button>
            <mat-divider></mat-divider>
            <button
              mat-menu-item
              class="dropdown-item logout"
              (click)="onLogout()"
            >
              <mat-icon>logout</mat-icon>
              <span>{{ "NAVBAR.LOGOUT" | translate }}</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</mat-toolbar>

<!-- Overlay to close dropdown when clicking outside -->
<div
  class="dropdown-overlay"
  [class.show]="isUserMenuOpen || isLanguageMenuOpen"
  (click)="isUserMenuOpen = false; isLanguageMenuOpen = false"
></div>
