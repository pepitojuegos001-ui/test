<div class="chart-wrapper">
  <div class="chart-container">
    <canvas 
      baseChart
      class="chart-canvas"
      [data]="barChartData"
      [options]="barChartOptions"
      [type]="barChartType"
      [legend]="barChartLegend"
      [plugins]="barChartPlugins">
    </canvas>
  </div>
  
  <div class="chart-summary" *ngIf="data && data.length > 0">
    <div class="summary-item">
      <span class="summary-label">Avg Income:</span>
      <span class="summary-value income">
        {{ getAverageIncome() | currency:'USD':'symbol':'1.0-0' }}
      </span>
    </div>
    <div class="summary-item">
      <span class="summary-label">Avg Expenses:</span>
      <span class="summary-value expense">
        {{ getAverageExpenses() | currency:'USD':'symbol':'1.0-0' }}
      </span>
    </div>
    <div class="summary-item">
      <span class="summary-label">Avg Balance:</span>
      <span class="summary-value" [class.positive]="getAverageBalance() >= 0" [class.negative]="getAverageBalance() < 0">
        {{ getAverageBalance() | currency:'USD':'symbol':'1.0-0' }}
      </span>
    </div>
  </div>
</div>
